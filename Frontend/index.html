<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MaaSuraksha - Maternal Risk Detection</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div class="container">

<h1>MaaSuraksha</h1>
<p class="subtitle">AI Maternal Health Risk Assessment</p>

<div class="form-card">

<h2>Enter Patient Vitals</h2>

<form id="riskForm">

<input type="number" placeholder="Age" id="age" required>

<input type="number" placeholder="Systolic BP" id="sbp" required>

<input type="number" placeholder="Diastolic BP" id="dbp" required>

<input type="number" placeholder="Blood Sugar" id="bs" required>

<input type="number" placeholder="Body Temperature" id="temp" required>

<input type="number" placeholder="Heart Rate" id="hr" required>

<input type="number" placeholder="Hemoglobin" id="hb" required>

<button type="submit">Predict Risk</button>

</form>

</div>

<div id="result" class="result-card hidden">

<h2>Risk Result</h2>

<div id="riskLevel"></div>

<p id="recommendation"></p>

</div>

</div>

</body>
</html>
