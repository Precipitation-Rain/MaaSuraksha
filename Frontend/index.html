<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maternal Health Risk Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Maternal Health Risk Predictor</h1>
        <form id="predictForm">
            <label for="language">Language</label>
            <select id="language" required>
                <option value="">--Choose Language--</option>
                <option value="English">English</option>
                <option value="Marathi">Marathi</option>
                <option value="Hindi">Hindi</option>
                <option value="Tamil">Tamil</option>
                <option value="Telugu">Telugu</option>
            </select>

            <label for="age">Age</label>
            <input type="number" id="age" min="15" max="50" value="25" required>

            <label for="systolicBP">Systolic BP</label>
            <input type="number" id="systolicBP" min="80" max="200" value="120" required>

            <label for="diastolicBP">Diastolic BP</label>
            <input type="number" id="diastolicBP" min="50" max="130" value="80" required>

            <label for="bloodSugar">Blood Sugar Level</label>
            <input type="number" id="bloodSugar" min="3.0" max="20.0" step="0.1" value="5.5" required>

            <label for="heartRate">Heart Rate</label>
            <input type="number" id="heartRate" min="40" max="180" value="70" required>

            <label for="bodyTemp">Body Temperature (°F)</label>
            <input type="number" id="bodyTemp" min="95.0" max="105.0" step="0.1" value="98.6" required>

            <button type="submit">Predict Risk</button>
        </form>
        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
